name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      # V1 syntax + V2 TypeScript
      - run: npx turbo run check --filter='./packages/*' --filter='./apps/*'

  # Don't include smoke tests (they need running servers)

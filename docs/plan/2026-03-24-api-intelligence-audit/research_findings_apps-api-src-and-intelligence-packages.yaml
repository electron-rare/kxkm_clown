related_conventions:
  naming_patterns_in_domain: File names are capability-oriented (ws-chat, ws-ollama, ws-multimodal, rag, mcp-tools). Export names are direct and descriptive. Route factories and create* functions are common.
  structure_of_domain: HTTP app assembly is modularized into route factories, but WebSocket chat capability remains partially split between a thin transport layer and a few large feature modules. Package boundaries are clearer in persona-domain and node-engine than inside the chat command layer.
  error_handling_in_domain: Structured logger and trackError are common for external system failures. Optional backend failures usually degrade instead of throwing. Some cleanup/file operations still use empty catches.
  testing_in_domain: Tests sit next to modules and include unit, integration, and smoke coverage for API, WS, RAG, tool-calling, uploads, multimodal, and media behavior.
  documentation_in_domain: Domain docs are unusually strong for an AI-heavy codebase, especially SPEC_RAG.md, ARCHITECTURE.md, OSS_VEILLE notes, and AGENTS docs.


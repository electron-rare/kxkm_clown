---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kxkm-api
  namespace: kxkm
  labels:
    app: kxkm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kxkm-api
  template:
    metadata:
      labels:
        app: kxkm-api
    spec:
      containers:
        - name: api
          image: kxkm-api:latest
          imagePullPolicy: Never  # Use local image (built on tower)
          ports:
            - containerPort: 3333
          env:
            - name: PORT
              value: "3333"
            - name: V2_API_PORT
              value: "3333"
            - name: NODE_ENV
              value: "production"
            - name: TTS_ENABLED
              value: "1"
            - name: MASCARADE_URL
              valueFrom:
                secretKeyRef:
                  name: kxkm-secrets
                  key: MASCARADE_URL
            - name: MASCARADE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kxkm-secrets
                  key: MASCARADE_API_KEY
            - name: OLLAMA_URL
              valueFrom:
                secretKeyRef:
                  name: kxkm-secrets
                  key: OLLAMA_URL
            - name: KOKORO_URL
              valueFrom:
                secretKeyRef:
                  name: kxkm-secrets
                  key: KOKORO_URL
            - name: AI_BRIDGE_URL
              valueFrom:
                secretKeyRef:
                  name: kxkm-secrets
                  key: AI_BRIDGE_URL
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kxkm-secrets
                  key: ADMIN_TOKEN
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v2/health
              port: 3333
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v2/health
              port: 3333
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kxkm-data
---
apiVersion: v1
kind: Service
metadata:
  name: kxkm-api
  namespace: kxkm
spec:
  type: NodePort
  selector:
    app: kxkm-api
  ports:
    - port: 3333
      targetPort: 3333
      nodePort: 30333
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kxkm-data
  namespace: kxkm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

patterns_found:
  - category: architecture
    pattern: dependency-injected seams around high-volatility AI capabilities
    description: The conversation router receives overridable functions for RAG, tool-calling, TTS, memory, and dispatch instead of hard-wiring infrastructure.
    examples:
      - file: apps/api/src/ws-conversation-router.ts
        location: apps/api/src/ws-conversation-router.ts:74
        snippet: ConversationRouterDeps exposes getToolsForPersona, streamOllamaChatWithTools, loadPersonaMemory, updatePersonaMemory, synthesizeTTS, and dispatchCommand.
    prevalence: common
  - category: architecture
    pattern: graceful degradation and multi-backend fallback chains
    description: Several subsystems prefer an advanced backend first but degrade to a simpler local path instead of failing closed.
    examples:
      - file: apps/api/src/rag.ts
        location: apps/api/src/rag.ts:125
        snippet: LightRAG search falls back to local cosine retrieval when remote graph retrieval fails or is empty.
      - file: apps/api/src/ws-multimodal.ts
        location: apps/api/src/ws-multimodal.ts:131
        snippet: TTS tries Kokoro, then Piper, then Qwen3-TTS, then a last-resort Kokoro voice.
      - file: apps/api/src/llm-client.ts
        location: apps/api/src/llm-client.ts:166
        snippet: chat() attempts mascarade first and then falls back to direct Ollama.
    prevalence: common
  - category: performance
    pattern: latency-aware heuristics on prompt/context/tool execution
    description: The stack contains explicit heuristics to reduce unnecessary expensive work for trivial messages and short prompts.
    examples:
      - file: apps/api/src/ws-conversation-router.ts
        location: apps/api/src/ws-conversation-router.ts:144
        snippet: buildConversationInput skips RAG for short messages and fetches context plus RAG in parallel.
      - file: apps/api/src/ws-ollama.ts
        location: apps/api/src/ws-ollama.ts:33
        snippet: estimateNumCtx and estimateMaxTokens adapt token budgets to message length.
      - file: apps/api/src/ws-ollama.ts
        location: apps/api/src/ws-ollama.ts:346
        snippet: mightNeedTools short-circuits the tool probe for messages unlikely to need tools.
    prevalence: common
  - category: structure
    pattern: command-heavy chat surface concentrated in one large handler
    description: Chat behavior is implemented through a very large switch-based command handler rather than smaller capability modules.
    examples:
      - file: apps/api/src/ws-commands-chat.ts
        location: apps/api/src/ws-commands-chat.ts:69
        snippet: createChatCommandHandler contains a long switch with chat, research, composition, and system commands.
    prevalence: common
  - category: error_handling
    pattern: structured tracking with selective silent fallbacks
    description: The code uses trackError/logger in many paths, but also contains silent catches around cleanup and optional backends.
    examples:
      - file: apps/api/src/rag.ts
        location: apps/api/src/rag.ts:165
        snippet: trackError is used for LightRAG and reranker failures while preserving local fallback behavior.
      - file: apps/api/src/ws-chat.ts
        location: apps/api/src/ws-chat.ts:49
        snippet: setChatPaused swallows unlink errors during maintenance-mode disable.
    prevalence: occasional
  - category: testing
    pattern: seam-focused tests plus smoke coverage for integration hotspots
    description: Most AI-critical boundaries have dedicated tests instead of relying only on end-to-end coverage.
    examples:
      - file: apps/api/src/ws-ollama.test.ts
        location: apps/api/src/ws-ollama.test.ts:322
        snippet: streamOllamaChatWithTools is covered directly.
      - file: apps/api/src/ws-chat-smoke.test.ts
        location: apps/api/src/ws-chat-smoke.test.ts:46
        snippet: malformed JSON, rate limiting, and dispatch seams are validated through smoke tests.
      - file: apps/api/src/mcp-tools.test.ts
        location: apps/api/src/mcp-tools.test.ts:31
        snippet: per-persona tool authorization is asserted directly.
    prevalence: common
  - category: security
    pattern: boundary validation is strongest at HTTP/WS ingress, weaker inside internal persistence/media modules
    description: Zod and MIME checks protect network inputs, but media/composition internals still rely on synchronous raw JSON/filesystem access patterns.
    examples:
      - file: apps/api/src/schemas.ts
        location: apps/api/src/schemas.ts:77
        snippet: wsMessageSchema constrains inbound WebSocket payload types and sizes.
      - file: apps/api/src/ws-upload-handler.ts
        location: apps/api/src/ws-upload-handler.ts:50
        snippet: MIME magic-byte validation rejects unsafe uploads.
      - file: apps/api/src/routes/media.ts
        location: apps/api/src/routes/media.ts:86
        snippet: compositions are listed by reading JSON directly from disk without repo abstraction.
    prevalence: common


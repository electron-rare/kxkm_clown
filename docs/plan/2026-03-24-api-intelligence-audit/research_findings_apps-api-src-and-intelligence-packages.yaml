domain_security_considerations:
  sensitive_areas:
    - area: upload ingestion
      location: apps/api/src/ws-upload-handler.ts
      concern: Accepts user-supplied binary payloads and spawns Python extractors/transcribers; MIME checking is strong but process and temp-file paths remain critical.
    - area: session and permission boundaries
      location: apps/api/src/app-middleware.ts and apps/api/src/app.ts
      concern: Admin and viewer/operator boundaries are enforced at HTTP middleware level; WebSocket persona interactions are outside that RBAC path.
    - area: shared/media file serving
      location: apps/api/src/routes/media.ts
      concern: Files are served from disk and shared gallery uses raw-body parsing plus JSONL indexing.
  authentication_patterns_in_domain: Express routes use cookie-backed sessions resolved through createSessionMiddleware and permission gates from @kxkm/auth.
  authorization_patterns_in_domain: HTTP admin/read/write boundaries are explicit in middleware; persona tool access is also role-like, enforced per persona in mcp-tools.ts.
  data_validation_in_domain: Zod validates HTTP and WS message bodies; upload handler adds magic-byte verification and explicit size/rate limits.

testing_patterns:
  framework: node:test style with assert, plus smoke/integration tests adjacent to source files
  coverage_areas:
    - WebSocket smoke behavior and malformed input handling
    - tool registry and per-persona tool permissions
    - Ollama streaming and tool-calling behavior
    - RAG search and reranker circuit-breaker behavior
    - upload security and multimodal processing
    - app routes for personas, sessions, permissions, and media
  test_organization: Co-located *.test.ts files across apps/api/src and packages/*/src.
  mock_patterns:
    - global fetch replacement for Ollama, search, and backend stubbing
    - dependency injection into router/handler factories
    - fake API servers for MCP and HTTP integration tests

open_questions:
  - question: Is ws-commands-chat.ts intended to remain a monolithic feature switchboard or is further extraction already planned?
    context: The file is the largest intelligence-facing module and concentrates unrelated command domains, which changes how safe future evolution is.
  - question: What is the intended persistence boundary for compositions and shared media versus repository-backed storage?
    context: Composition/media paths bypass the repository abstractions used elsewhere in app.ts and create-repos.ts.
  - question: Is the default production path supposed to prefer llm-client/mascarade over direct Ollama for all personas?
    context: ws-conversation-router aliases defaultStreamOllamaChat to streamLLMChat, which changes failure and latency assumptions.
  - question: How far should persona memory evolve beyond JSON file persistence?
    context: ws-persona-router currently maintains file-based memory plus cache/LLM summarization, while persona-domain already models richer editorial/training flows.

gaps:
  - area: full ws-commands-chat.ts command inventory
    description: Only representative segments and command pivots were read; the entire 1591-line switch was not exhaustively enumerated.
    impact: Some lower-priority command-specific risks or strengths may be omitted from the analysis.
  - area: runtime behavior on the remote kxkm-ai host
    description: The analysis used source and docs, not live end-to-end execution against the target deployment host.
    impact: Performance and failure-mode conclusions are code-grounded but not runtime-verified in this pass.
  - area: storage package internals
    description: packages/storage was not deeply read because the user focus was apps/api/src plus intelligence packages.
    impact: Persistence tradeoffs were inferred mainly from call sites rather than repository implementation details.

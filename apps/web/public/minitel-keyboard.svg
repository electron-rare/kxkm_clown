<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="kbBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c9a8"/>
      <stop offset="100%" stop-color="#c4b998"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <linearGradient id="greenKey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22aa44"/>
      <stop offset="100%" stop-color="#1a8836"/>
    </linearGradient>
    <linearGradient id="redKey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc3333"/>
      <stop offset="100%" stop-color="#aa2222"/>
    </linearGradient>
  </defs>

  <!-- Keyboard body -->
  <rect x="0" y="0" width="600" height="200" rx="8" fill="url(#kbBg)"/>

  <!-- Function keys row -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="7.5" font-weight="bold" text-anchor="middle">
    <!-- Sommaire -->
    <rect x="14" y="10" width="56" height="22" rx="3" fill="url(#keyGrad)"/>
    <text x="42" y="24" fill="#ccc">Sommaire</text>

    <!-- Annulation -->
    <rect x="76" y="10" width="56" height="22" rx="3" fill="url(#keyGrad)"/>
    <text x="104" y="24" fill="#ccc">Annulation</text>

    <!-- Retour -->
    <rect x="138" y="10" width="56" height="22" rx="3" fill="url(#keyGrad)"/>
    <text x="166" y="24" fill="#ccc">Retour</text>

    <!-- Repetition -->
    <rect x="200" y="10" width="56" height="22" rx="3" fill="url(#keyGrad)"/>
    <text x="228" y="24" fill="#ccc" font-size="7">Repetition</text>

    <!-- Guide -->
    <rect x="262" y="10" width="56" height="22" rx="3" fill="url(#keyGrad)"/>
    <text x="290" y="24" fill="#ccc">Guide</text>

    <!-- Correction -->
    <rect x="324" y="10" width="56" height="22" rx="3" fill="url(#keyGrad)"/>
    <text x="352" y="24" fill="#ccc">Correction</text>

    <!-- Suite -->
    <rect x="386" y="10" width="56" height="22" rx="3" fill="url(#keyGrad)"/>
    <text x="414" y="24" fill="#ccc">Suite</text>

    <!-- Envoi (green) -->
    <rect x="448" y="10" width="56" height="22" rx="3" fill="url(#greenKey)"/>
    <text x="476" y="24" fill="#fff">Envoi</text>

    <!-- Connexion/Fin (red) -->
    <rect x="510" y="10" width="76" height="22" rx="3" fill="url(#redKey)"/>
    <text x="548" y="24" fill="#fff">Connexion/Fin</text>
  </g>

  <!-- AZERTY Row 1: number row -->
  <g>
    <rect x="14" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="46" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="78" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="110" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="142" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="174" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="206" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="238" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="270" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="302" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="334" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="366" y="42" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
  </g>
  <!-- Number labels -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">
    <text x="28" y="60">&amp;</text><text x="60" y="60">1</text><text x="92" y="60">2</text>
    <text x="124" y="60">3</text><text x="156" y="60">4</text><text x="188" y="60">5</text>
    <text x="220" y="60">6</text><text x="252" y="60">7</text><text x="284" y="60">8</text>
    <text x="316" y="60">9</text><text x="348" y="60">0</text><text x="380" y="60">-</text>
  </g>

  <!-- AZERTY Row 2 -->
  <g>
    <rect x="22" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="54" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="86" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="118" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="150" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="182" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="214" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="246" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="278" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="310" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="342" y="74" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">
    <text x="36" y="92">A</text><text x="68" y="92">Z</text><text x="100" y="92">E</text>
    <text x="132" y="92">R</text><text x="164" y="92">T</text><text x="196" y="92">Y</text>
    <text x="228" y="92">U</text><text x="260" y="92">I</text><text x="292" y="92">O</text>
    <text x="324" y="92">P</text><text x="356" y="92">^</text>
  </g>

  <!-- AZERTY Row 3 -->
  <g>
    <rect x="30" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="62" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="94" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="126" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="158" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="190" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="222" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="254" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="286" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="318" y="106" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">
    <text x="44" y="124">Q</text><text x="76" y="124">S</text><text x="108" y="124">D</text>
    <text x="140" y="124">F</text><text x="172" y="124">G</text><text x="204" y="124">H</text>
    <text x="236" y="124">J</text><text x="268" y="124">K</text><text x="300" y="124">L</text>
    <text x="332" y="124">M</text>
  </g>

  <!-- AZERTY Row 4 -->
  <g>
    <rect x="46" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="78" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="110" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="142" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="174" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="206" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="238" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
    <rect x="270" y="138" width="28" height="28" rx="3" fill="url(#keyGrad)"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">
    <text x="60" y="156">W</text><text x="92" y="156">X</text><text x="124" y="156">C</text>
    <text x="156" y="156">V</text><text x="188" y="156">B</text><text x="220" y="156">N</text>
    <text x="252" y="156">,</text><text x="284" y="156">.</text>
  </g>

  <!-- Space bar -->
  <rect x="110" y="170" width="180" height="22" rx="3" fill="url(#keyGrad)"/>

  <!-- Arrow cluster (right side) -->
  <rect x="420" y="74" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
  <rect x="448" y="74" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
  <rect x="434" y="52" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
  <rect x="434" y="96" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
  <!-- Arrow symbols -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#aaa" text-anchor="middle">
    <text x="432" y="91">&lt;</text>
    <text x="460" y="91">&gt;</text>
    <text x="446" y="69">&#x2227;</text>
    <text x="446" y="113">&#x2228;</text>
  </g>

  <!-- Numeric pad area (right) -->
  <g>
    <rect x="500" y="52" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="528" y="52" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="556" y="52" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="500" y="80" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="528" y="80" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="556" y="80" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="500" y="108" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="528" y="108" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="556" y="108" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
    <rect x="514" y="136" width="24" height="24" rx="3" fill="url(#keyGrad)"/>
  </g>
  <g font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">
    <text x="512" y="68">7</text><text x="540" y="68">8</text><text x="568" y="68">9</text>
    <text x="512" y="96">4</text><text x="540" y="96">5</text><text x="568" y="96">6</text>
    <text x="512" y="124">1</text><text x="540" y="124">2</text><text x="568" y="124">3</text>
    <text x="526" y="152">0</text>
  </g>
</svg>

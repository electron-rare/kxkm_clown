plan_id: 2026-03-24-api-intelligence-audit
objective: Deep analysis of apps/api/src and intelligence-related packages with focus on RAG, WebSocket chat, tool-calling, multimodal, composition, and personas.
focus_area: apps-api-src-and-intelligence-packages
created_at: 2026-03-24
created_by: GitHub Copilot GPT-5.4
status: completed

tldr: |
  - The API intelligence stack is already modular at the seam level: WebSocket transport, conversation routing, tool-calling, multimodal I/O, and RAG are separated enough to evolve independently.
  - The strongest implementation traits are graceful degradation paths: mascarade -> Ollama fallback, LightRAG -> local cosine fallback, reranker circuit breaker, and multi-backend TTS fallback.
  - The main technical debt is concentrated around synchronous filesystem I/O inside hot API/media/composition paths and several large god-modules, especially ws-commands-chat.ts.
  - Test coverage is materially better than average for an experimental AI stack: smoke, integration, route, RAG, tool-calling, upload, and multimodal tests are all present.
  - The most direct 2026 opportunities are Qwen3.5:9b adoption, LightRAG refresh, stronger multilingual reranking, Docling-based ingestion, and a dedicated realtime voice transport.

research_metadata:
  methodology: Hybrid retrieval using semantic_search, grep_search, targeted read_file passes, repo instruction loading, and internal docs review for 2026 OSS watch notes. Relationship discovery was performed by following imports and execution seams from ws-chat.ts, ws-conversation-router.ts, ws-ollama.ts, rag.ts, and related packages.
  scope: Focused on apps/api/src plus related packages/persona-domain and packages/node-engine, with supporting reads in routes/media.ts, server.ts, and 2026 research docs.
  confidence: high
  coverage: 78

